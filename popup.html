<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font:
          13px/1.4 system-ui,
          sans-serif;
        width: 340px;
        margin: 0;
        padding: 10px;
      }
      #status {
        font-weight: 600;
        margin-bottom: 8px;
      }
      #list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 360px;
        overflow-y: auto;
      }
      .finding {
        border-left: 3px solid #999;
        padding: 4px 8px;
        background: #f6f6f7;
        border-radius: 3px;
        cursor: pointer;
      }
      .finding:hover {
        background: #eee;
      }
      .finding.sev-high {
        border-color: #e5484d;
      }
      .finding.sev-medium {
        border-color: #f5a623;
      }
      .finding.sev-low {
        border-color: #3b82f6;
      }
      .label {
        font-weight: 500;
      }
      .ctx {
        color: #666;
        font-size: 11px;
        margin-top: 2px;
        word-break: break-word;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="status">Scanning…</div>
    <div id="list"></div>
    <button id="rescan">Re-scan page</button>
    <script src="popup.js"></script>
  </body>
</html>
